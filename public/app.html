<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — Invoice OAuth starter</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f7;
    margin: 0;
    color: #111;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    background: #fff;
    border-bottom: 1px solid #e2e2e5;
  }
  header h1 { font-size: 1.1rem; margin: 0; }
  header button {
    padding: 0.45rem 0.8rem;
    border: 1px solid #d5d5da;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
    font-size: 0.85rem;
  }
  header button:hover { background: #f0f0f2; }
  main {
    max-width: 720px;
    margin: 2rem auto;
    padding: 0 1.5rem;
  }
  .actions { display: flex; gap: 0.7rem; margin-bottom: 1.5rem; }
  .actions button {
    padding: 0.55rem 0.9rem;
    border: none;
    border-radius: 6px;
    background: #111;
    color: #fff;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .actions button:hover { background: #333; }
  .list { display: flex; flex-direction: column; gap: 0.7rem; }
  .conn {
    background: #fff;
    border-radius: 10px;
    border: 1px solid #e2e2e5;
    padding: 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .conn-info { display: flex; flex-direction: column; gap: 0.2rem; }
  .conn-provider { font-weight: 600; text-transform: capitalize; }
  .conn-email { font-size: 0.85rem; color: #666; }
  .badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
    width: fit-content;
  }
  .badge.active { background: #e3f8e9; color: #1e7e34; }
  .badge.reauth_required { background: #fdecea; color: #c0392b; }
  .badge.other { background: #eee; color: #555; }
  .conn-buttons { display: flex; gap: 0.5rem; }
  .conn-buttons button {
    padding: 0.4rem 0.7rem;
    border: 1px solid #d5d5da;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
    font-size: 0.8rem;
  }
  .conn-buttons button:hover { background: #f0f0f2; }
  .conn-buttons button.danger:hover { background: #fdecea; border-color: #c0392b; color: #c0392b; }
  .empty { color: #888; font-size: 0.9rem; }
  pre {
    background: #111;
    color: #d4d4d4;
    padding: 1rem;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 0.8rem;
    max-height: 320px;
  }
</style>
</head>
<body>
  <header>
    <h1>Invoice OAuth starter</h1>
    <button id="signout-btn">Sign out</button>
  </header>
  <main>
    <div class="actions">
      <button id="connect-google">Connect Gmail</button>
      <button id="connect-microsoft">Connect Microsoft</button>
    </div>
    <div class="list" id="list"></div>
    <pre id="output" style="display:none"></pre>
  </main>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const cfg = await fetch('/config').then((r) => r.json());
    const supabase = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

    function setSbCookie(accessToken) {
      document.cookie = `sb_token=${accessToken}; path=/; SameSite=Lax`;
    }

    function clearSbCookie() {
      document.cookie = 'sb_token=; path=/; SameSite=Lax; Max-Age=0';
    }

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      window.location.href = '/login.html';
    }
    setSbCookie(session.access_token);

    supabase.auth.onAuthStateChange((_event, newSession) => {
      if (newSession) {
        setSbCookie(newSession.access_token);
      } else {
        clearSbCookie();
        window.location.href = '/login.html';
      }
    });

    const list = document.getElementById('list');
    const output = document.getElementById('output');

    function badgeClass(status) {
      if (status === 'active') return 'active';
      if (status === 'reauth_required') return 'reauth_required';
      return 'other';
    }

    async function authedFetch(path, options = {}) {
      const { data: { session } } = await supabase.auth.getSession();
      return fetch(path, {
        ...options,
        headers: {
          ...(options.headers ?? {}),
          Authorization: `Bearer ${session.access_token}`,
        },
      });
    }

    async function loadConnections() {
      const res = await authedFetch('/connections');
      const conns = await res.json();

      if (conns.length === 0) {
        list.innerHTML = '<p class="empty">No connections yet. Connect Gmail or Microsoft above.</p>';
        return;
      }

      list.innerHTML = '';
      for (const c of conns) {
        const row = document.createElement('div');
        row.className = 'conn';
        row.innerHTML = `
          <div class="conn-info">
            <span class="conn-provider">${c.provider}</span>
            <span class="conn-email">${c.email ?? ''}</span>
            <span class="badge ${badgeClass(c.status)}">${c.status}</span>
          </div>
          <div class="conn-buttons">
            <button class="test-btn">Test</button>
            <button class="danger disconnect-btn">Disconnect</button>
          </div>
        `;
        row.querySelector('.test-btn').addEventListener('click', () => testConnection(c.id));
        row.querySelector('.disconnect-btn').addEventListener('click', () => disconnectConnection(c.id));
        list.appendChild(row);
      }
    }

    async function testConnection(id) {
      output.style.display = 'block';
      output.textContent = 'Loading…';
      const res = await authedFetch(`/test/${id}`);
      const data = await res.json();
      output.textContent = JSON.stringify(data, null, 2);
    }

    async function disconnectConnection(id) {
      await authedFetch(`/connections/${id}`, { method: 'DELETE' });
      await loadConnections();
    }

    document.getElementById('connect-google').addEventListener('click', () => {
      window.location.href = '/connect/google';
    });
    document.getElementById('connect-microsoft').addEventListener('click', () => {
      window.location.href = '/connect/microsoft';
    });

    document.getElementById('signout-btn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      clearSbCookie();
      window.location.href = '/login.html';
    });

    await loadConnections();
  </script>
</body>
</html>
