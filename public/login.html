<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — Curizen Portal</title>
<link rel="stylesheet" href="/portal.css" />
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .brand .mark {
    width: 30px; height: 30px; border-radius: 8px; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
  }
  .brand .mark svg { width: 17px; height: 17px; }
  .brand span { font-family: var(--font-heading); font-weight: 700; font-size: 18px; }

  .card {
    background: #fff;
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 2rem;
    width: 100%;
    max-width: 360px;
  }
  h1 { font-size: 1.1rem; margin: 0 0 1.2rem; text-align: center; color: var(--subtitle); font-weight: 500; font-family: var(--font-body); }
  form { display: flex; flex-direction: column; gap: 0.55rem; }
  input {
    padding: 0.6rem 0.7rem;
    border: 1px solid #d7dae2;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: var(--font-body);
  }
  input.invalid { border-color: #c0392b; }
  button.primary {
    padding: 0.6rem 0.7rem;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: var(--font-body);
    cursor: pointer;
    margin-top: 0.3rem;
  }
  button.primary:hover { background: var(--accent-dark); }
  button.primary:disabled { background: #c7ccd6; cursor: default; }
  .field-error {
    color: #c0392b;
    font-size: 0.78rem;
    min-height: 0.9em;
    margin: -0.25rem 0 0;
  }
  .form-error {
    color: #c0392b;
    font-size: 0.85rem;
    min-height: 0.9em;
  }
</style>
</head>
<body>
  <div>
    <div class="brand">
      <span class="mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12 12 4l8 8" /><path d="M6 10.5V19a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-8.5" />
        </svg>
      </span>
      <span>Curizen Portal</span>
    </div>
    <div class="card">
      <h1>Sign in to Curizen Portal</h1>

      <form id="signin-form" novalidate>
        <input type="email" id="si-email" placeholder="Email" autocomplete="email" />
        <div class="field-error" id="si-email-err"></div>
        <input type="password" id="si-password" placeholder="Password" autocomplete="current-password" />
        <div class="field-error" id="si-password-err"></div>
        <div class="form-error" id="si-error"></div>
        <button class="primary" type="submit" id="si-submit">Sign in</button>
      </form>
    </div>
  </div>

  <script type="module" src="/js/login.js"></script>
</body>
</html>
