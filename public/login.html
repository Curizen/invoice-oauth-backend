<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — Invoice OAuth starter</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f7;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    padding: 2rem;
    width: 100%;
    max-width: 360px;
  }
  h1 { font-size: 1.25rem; margin: 0 0 1rem; }
  .tabs { display: flex; margin-bottom: 1rem; border-bottom: 1px solid #e2e2e5; }
  .tab {
    flex: 1;
    padding: 0.5rem;
    text-align: center;
    cursor: pointer;
    border: none;
    background: none;
    font-size: 0.95rem;
    color: #888;
    border-bottom: 2px solid transparent;
  }
  .tab.active { color: #111; border-bottom-color: #111; font-weight: 600; }
  form { display: flex; flex-direction: column; gap: 0.6rem; }
  input {
    padding: 0.6rem 0.7rem;
    border: 1px solid #d5d5da;
    border-radius: 6px;
    font-size: 0.95rem;
  }
  button.primary {
    padding: 0.6rem 0.7rem;
    border: none;
    border-radius: 6px;
    background: #111;
    color: #fff;
    font-size: 0.95rem;
    cursor: pointer;
    margin-top: 0.2rem;
  }
  button.primary:hover { background: #333; }
  .divider {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin: 1.1rem 0;
    color: #999;
    font-size: 0.8rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #e2e2e5;
  }
  button.google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.55rem 0.7rem;
    border: 1px solid #d5d5da;
    border-radius: 6px;
    background: #fff;
    font-size: 0.9rem;
    cursor: pointer;
    width: 100%;
  }
  button.google:hover { background: #f7f7f8; }
  .msg { font-size: 0.85rem; margin-top: 0.7rem; min-height: 1.1em; }
  .msg.error { color: #c0392b; }
  .msg.ok { color: #1e7e34; }
</style>
</head>
<body>
  <div class="card">
    <h1>Invoice OAuth starter</h1>
    <div class="tabs">
      <button class="tab active" id="tab-signin" type="button">Sign in</button>
      <button class="tab" id="tab-signup" type="button">Sign up</button>
    </div>

    <form id="auth-form">
      <input type="email" id="email" placeholder="Email" autocomplete="email" required />
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />
      <button class="primary" type="submit" id="submit-btn">Sign in</button>
    </form>

    <div class="msg" id="msg"></div>

    <div class="divider">or</div>

    <button class="google" id="google-btn" type="button">Continue with Google</button>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const cfg = await fetch('/config').then((r) => r.json());
    const supabase = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      window.location.href = '/app.html';
    }

    let mode = 'signin';
    const tabSignin = document.getElementById('tab-signin');
    const tabSignup = document.getElementById('tab-signup');
    const submitBtn = document.getElementById('submit-btn');
    const msg = document.getElementById('msg');

    function setMode(next) {
      mode = next;
      tabSignin.classList.toggle('active', mode === 'signin');
      tabSignup.classList.toggle('active', mode === 'signup');
      submitBtn.textContent = mode === 'signin' ? 'Sign in' : 'Sign up';
      msg.textContent = '';
      msg.className = 'msg';
    }
    tabSignin.addEventListener('click', () => setMode('signin'));
    tabSignup.addEventListener('click', () => setMode('signup'));

    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      msg.textContent = 'Working…';
      msg.className = 'msg';

      const { data, error } =
        mode === 'signin'
          ? await supabase.auth.signInWithPassword({ email, password })
          : await supabase.auth.signUp({ email, password });

      if (error) {
        msg.textContent = error.message;
        msg.className = 'msg error';
        return;
      }

      if (mode === 'signup' && !data.session) {
        msg.textContent = 'Check your email to confirm your account, then sign in.';
        msg.className = 'msg ok';
        setMode('signin');
        return;
      }

      window.location.href = '/app.html';
    });

    document.getElementById('google-btn').addEventListener('click', async () => {
      await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/app.html' },
      });
    });
  </script>
</body>
</html>
